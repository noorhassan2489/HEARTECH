name: heartech
description: "HearTech — Early childhood hearing risk screening app for Pakistan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_analytics: ^12.2.0

  # Auth
  google_sign_in: ^6.2.1

  # State Management & Navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0

  # UI & Design
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  fl_chart: ^1.2.0
  confetti: ^0.8.0
  flutter_pdfview: ^1.3.2
  sticky_headers: ^0.3.0

  # Network & API
  dio: ^5.9.2

  # Cloud Services
  cloudinary_flutter: ^1.3.0
  cloudinary_url_gen: ^1.8.0
  onesignal_flutter: ^5.4.3

  # Audio
  record: ^6.2.0
  just_audio: ^0.9.40

  # Local Storage & Security
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

  # Sharing
  share_plus: ^10.1.4

  # Image
  image_picker: ^1.2.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
